[workspace]
resolver = "2"
members = [
    "libakuma",
    "libakuma-tls",
    "apk-tools",
    "box",
    "echo2",
    "elftest",
    "hello",
    "herd",
    "httpd",
    "meow",
    "quickjs",
    "stackstress",
    "stdcheck",
    "termtest",
    "allocstress",
    "top",
    "tcc",
    "tar",
    "sshd",
    "llama.cpp",
    "crush",
    "stp_test"
]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true
opt-level = "s"

