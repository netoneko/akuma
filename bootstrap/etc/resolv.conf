# QEMU SLIRP's built-in DNS forwarder (10.0.2.3) returns empty answers in some
# host environments (e.g. macOS behind a VPN), so default to a public resolver
# reachable via the default route → SLIRP → internet. Swap back to 10.0.2.3 if
# your host's SLIRP DNS works and you prefer to stay off the public internet.
nameserver 8.8.8.8
nameserver 1.1.1.1
